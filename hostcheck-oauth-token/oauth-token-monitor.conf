###############################################################################
# oauth-token-monitor.conf
#
# Configuration for the oauth-token-monitor.sh script.
# Place this file at: /etc/oauth-token-monitor/oauth-token-monitor.conf
#
# This file is sourced by bash — use key=value syntax (no spaces around =).
###############################################################################

# ── Telegram notifications ───────────────────────────────────────────────────
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# ── Email notifications (fallback) ──────────────────────────────────────────
EMAIL_ENABLED="false"
EMAIL_TO="admin@example.com"
EMAIL_FROM="oauth-monitor@$(hostname -f 2>/dev/null || hostname)"

# ── Syslog ───────────────────────────────────────────────────────────────────
SYSLOG_ENABLED="true"
SYSLOG_TAG="oauth-token-monitor"

# ── Alert cooldown ───────────────────────────────────────────────────────────
ALERT_COOLDOWN_SEC=3600

# ── Checks (enable / disable) ───────────────────────────────────────────────
CHECK_TOKEN_EXISTS="true"
CHECK_TOKEN_EXPIRY="true"
CHECK_TOKEN_STALENESS="true"
CHECK_TOKEN_REFRESH="false"         # Disabled by default — hits Microsoft API
CHECK_SASL_CONFIG="true"
CHECK_TOKEN_PERMISSIONS="true"

# ── Token files ──────────────────────────────────────────────────────────────
# Space-separated list of sasl-xoauth2 token file paths.
# Leave empty for auto-discovery (searches common locations).
#
# To find your token file path, check your Postfix sasl_passwd:
#   cat /etc/postfix/sasl_passwd
#
# Example:
#   TOKEN_FILES="/var/spool/postfix/sasl2/tokens/postfix@yourdomain.com"
#   TOKEN_FILES="/var/spool/postfix/sasl2/tokens/user1 /var/spool/postfix/sasl2/tokens/user2"
TOKEN_FILES=""

# ── Token expiry thresholds ─────────────────────────────────────────────────
# Access token expiry warning/critical (hours).
# sasl-xoauth2 auto-refreshes tokens, so a warning here means the refresh
# cycle may not be keeping up.
TOKEN_WARN_HOURS=24
TOKEN_CRIT_HOURS=2

# ── Token staleness thresholds ──────────────────────────────────────────────
# sasl-xoauth2 updates the token file on every successful refresh.
# If the file hasn't been modified recently, the refresh cycle may be broken.
#
# Common cause: no outbound mail is being sent, so sasl-xoauth2 never
# triggers a refresh. The token quietly expires.
TOKEN_STALE_HOURS=6
TOKEN_STALE_CRIT_HOURS=24

# ── sasl-xoauth2 configuration ─────────────────────────────────────────────
# Path to the sasl-xoauth2 config file (contains client_id, token_endpoint)
SASL_XOAUTH2_CONF="/etc/sasl-xoauth2.conf"

# ── Token refresh test (optional) ──────────────────────────────────────────
# Your Microsoft Entra tenant ID (required for refresh test only).
# Find it in the Azure portal under App Registrations → Overview → Directory ID.
# Leave empty to skip the refresh test.
TENANT_ID=""

# ── Paths ────────────────────────────────────────────────────────────────────
STATE_DIR="/var/lib/oauth-token-monitor"
LOG_FILE="/var/log/oauth-token-monitor.log"
