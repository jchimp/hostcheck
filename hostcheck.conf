###############################################################################
# hostcheck.conf
#
# Master configuration for the hostcheck suite.
# Place this file at: /etc/hostcheck/hostcheck.conf
#
# All four modules (health, sec, mail, oauth-token) load this single file.
# This file is sourced by bash — use key=value syntax (no spaces around =).
###############################################################################

# ══════════════════════════════════════════════════════════════════════════════
# GENERAL — Notifications & shared settings
# ══════════════════════════════════════════════════════════════════════════════

# ── Telegram ──────────────────────────────────────────────────────────────────
# Setup:
#   1. Message @BotFather on Telegram → /newbot → copy the bot token
#   2. Start a chat with your bot, send any message
#   3. GET https://api.telegram.org/bot<TOKEN>/getUpdates → find chat_id
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# ── Email ─────────────────────────────────────────────────────────────────────
# Requires msmtp, sendmail, or mail on the host.
EMAIL_ENABLED="false"
EMAIL_TO="admin@example.com"
EMAIL_FROM="hostcheck@$(hostname -f 2>/dev/null || hostname)"

# ── Syslog ────────────────────────────────────────────────────────────────────
SYSLOG_ENABLED="true"

# ── Alert cooldown ────────────────────────────────────────────────────────────
# Same alert will not be re-sent within this window (seconds). Default: 1 hour.
ALERT_COOLDOWN_SEC=3600

# ══════════════════════════════════════════════════════════════════════════════
# HEALTH MODULE — System & cluster health
# ══════════════════════════════════════════════════════════════════════════════

# ── Checks (enable / disable) ─────────────────────────────────────────────────
CHECK_NIC="true"
CHECK_DISK="true"
CHECK_SMART="true"
CHECK_CEPH="true"
CHECK_COROSYNC="true"
CHECK_PEERS="true"
CHECK_CPU="true"
CHECK_MEMORY="true"
CHECK_LOAD="true"
CHECK_SYSTEMD="true"
CHECK_FILESYSTEM="true"

# ── Thresholds ────────────────────────────────────────────────────────────────
DISK_WARN_PCT=85
DISK_CRIT_PCT=95
CPU_WARN_PCT=90
MEM_WARN_PCT=90
MEM_CRIT_PCT=95
LOAD_WARN_MULTIPLIER=2
SMART_TEMP_WARN=55

# ── Peer reachability ─────────────────────────────────────────────────────────
# Space-separated list of peer hostnames or IPs to ping.
# Leave empty to auto-detect from pvecm nodes (Proxmox only).
# Example: PEER_HOSTS="pve01 pve02 10.0.0.13"
PEER_HOSTS=""
PEER_PING_COUNT=3
PEER_PING_TIMEOUT=5

# ── NIC exclusions ────────────────────────────────────────────────────────────
# Regex for virtual/bridge interfaces to skip during NIC checks.
NIC_EXCLUDE="lo|veth.*|fwbr.*|fwpr.*|fwln.*|tap.*|docker.*"

# ══════════════════════════════════════════════════════════════════════════════
# SEC MODULE — Security & configuration drift
# ══════════════════════════════════════════════════════════════════════════════

# ── Checks (enable / disable) ─────────────────────────────────────────────────
CHECK_SSH_FAILED="true"
CHECK_SSH_ROOT="true"
CHECK_SUDO_FAILED="true"
CHECK_NEW_USERS="true"
CHECK_UPDATES="true"
CHECK_REBOOT="true"
CHECK_CERTS="true"
CHECK_SSH_CONFIG="true"
CHECK_AUTHORIZED_KEYS="true"
CHECK_LISTENING_PORTS="true"
CHECK_WORLD_WRITABLE="true"

# ── Auth log ──────────────────────────────────────────────────────────────────
# Leave empty for auto-detect:
#   Debian/Ubuntu/Proxmox → /var/log/auth.log
#   RHEL/Rocky/Alma       → /var/log/secure
AUTH_LOG=""

# ── Thresholds ────────────────────────────────────────────────────────────────
SSH_FAIL_WARN=10
SSH_FAIL_CRIT=50
SUDO_FAIL_WARN=5
CERT_WARN_DAYS=30
CERT_CRIT_DAYS=7

# Certificate paths to scan (space-separated, directories or files)
CERT_PATHS="/etc/pve/local /etc/ssl/certs"

# ══════════════════════════════════════════════════════════════════════════════
# MAIL MODULE — Postfix relay health
# ══════════════════════════════════════════════════════════════════════════════

# ── Checks (enable / disable) ─────────────────────────────────────────────────
CHECK_POSTFIX_SERVICE="true"
CHECK_QUEUE_SIZE="true"
CHECK_DEFERRED_AGE="true"
CHECK_QUEUE_GROWTH="true"
CHECK_RELAY_CONNECTIVITY="true"
CHECK_SASL_FAILURES="true"
CHECK_TLS_ERRORS="true"
CHECK_BOUNCES="true"
CHECK_MAIL_ERRORS="true"
CHECK_SPOOL_DISK="true"

# ── Queue thresholds ──────────────────────────────────────────────────────────
QUEUE_WARN=2
QUEUE_CRIT=4
DEFERRED_WARN_AGE=3600      # seconds (1 hour)
DEFERRED_CRIT_AGE=14400     # seconds (4 hours)
QUEUE_GROWTH_WARN=20

# ── Relay connectivity ────────────────────────────────────────────────────────
# Space-separated host:port pairs to TCP-check.
RELAY_HOSTS="smtp.gmail.com:587 smtp.office365.com:587"
RELAY_TIMEOUT=10

# ── SASL & bounce thresholds (per check interval) ────────────────────────────
SASL_FAIL_WARN=3
SASL_FAIL_CRIT=10
BOUNCE_WARN=20

# ── Spool disk ────────────────────────────────────────────────────────────────
SPOOL_WARN_PCT=80
SPOOL_CRIT_PCT=95

# ── Mail log ──────────────────────────────────────────────────────────────────
# Leave empty for auto-detect:
#   Debian/Ubuntu → /var/log/mail.log
#   RHEL/Rocky    → /var/log/maillog
MAIL_LOG=""

# ══════════════════════════════════════════════════════════════════════════════
# OAUTH-TOKEN MODULE — OAuth2 token expiry (M365 / sasl-xoauth2)
# ══════════════════════════════════════════════════════════════════════════════

# ── Checks (enable / disable) ─────────────────────────────────────────────────
CHECK_TOKEN_EXISTS="true"
CHECK_TOKEN_EXPIRY="true"
CHECK_TOKEN_STALENESS="true"
CHECK_TOKEN_REFRESH="false"     # Disabled by default — hits Microsoft API
CHECK_SASL_CONFIG="true"
CHECK_TOKEN_PERMISSIONS="true"

# ── Token files ───────────────────────────────────────────────────────────────
# Space-separated list of sasl-xoauth2 token file paths.
# Leave empty for auto-discovery (searches common locations).
# To find your token path: cat /etc/postfix/sasl_passwd
TOKEN_FILES=""

# ── Token expiry thresholds ───────────────────────────────────────────────────
TOKEN_WARN_HOURS=24
TOKEN_CRIT_HOURS=2

# ── Token staleness thresholds ────────────────────────────────────────────────
# sasl-xoauth2 updates the token file on each successful refresh.
# A stale file means the refresh cycle may be broken.
TOKEN_STALE_HOURS=6
TOKEN_STALE_CRIT_HOURS=24

# ── sasl-xoauth2 ─────────────────────────────────────────────────────────────
SASL_XOAUTH2_CONF="/etc/sasl-xoauth2.conf"

# ── Token refresh test (optional, requires TENANT_ID) ────────────────────────
# Find tenant ID: Azure portal → App Registrations → Overview → Directory ID
TENANT_ID=""
