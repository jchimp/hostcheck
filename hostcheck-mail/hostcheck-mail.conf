###############################################################################
# hostcheck-mail.conf
#
# Configuration for the hostcheck-mail.sh script.
# Place this file at: /etc/hostcheck-mail/hostcheck-mail.conf
#
# This file is sourced by bash — use key=value syntax (no spaces around =).
###############################################################################

# ── Telegram notifications ───────────────────────────────────────────────────
# To set up:
#   1. Message @BotFather on Telegram → /newbot → get the bot token
#   2. Start a chat with the bot, send a message
#   3. GET https://api.telegram.org/bot<TOKEN>/getUpdates → find chat_id
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# ── Email notifications (fallback) ──────────────────────────────────────────
# Requires sendmail, msmtp, or mail command on the host.
EMAIL_ENABLED="false"
EMAIL_TO="admin@example.com"
EMAIL_FROM="hostcheck-mail@$(hostname -f 2>/dev/null || hostname)"

# ── Syslog ───────────────────────────────────────────────────────────────────
SYSLOG_ENABLED="true"
SYSLOG_TAG="hostcheck-mail"

# ── Alert cooldown ───────────────────────────────────────────────────────────
# Same alert will not be re-sent within this window (in seconds).
# Default: 3600 (1 hour)
ALERT_COOLDOWN_SEC=3600

# ── Checks (enable / disable) ───────────────────────────────────────────────
CHECK_POSTFIX_SERVICE="true"
CHECK_QUEUE_SIZE="true"
CHECK_DEFERRED_AGE="true"
CHECK_QUEUE_GROWTH="true"
CHECK_RELAY_CONNECTIVITY="true"
CHECK_SASL_FAILURES="true"
CHECK_TLS_ERRORS="true"
CHECK_BOUNCES="true"
CHECK_MAIL_ERRORS="true"
CHECK_SPOOL_DISK="true"

# ── Queue thresholds ────────────────────────────────────────────────────────
# Total messages across all queues
QUEUE_WARN=50
QUEUE_CRIT=200

# Oldest deferred message age (seconds)
# 3600 = 1 hour, 14400 = 4 hours
DEFERRED_WARN_AGE=3600
DEFERRED_CRIT_AGE=14400

# Queue growth between runs (net new messages)
QUEUE_GROWTH_WARN=20

# ── Relay connectivity ───────────────────────────────────────────────────────
# Space-separated list of relay servers to check (host:port)
# Gmail relay uses port 587 with app passwords
# M365/Outlook relay uses port 587 with SASL XOAUTH2
RELAY_HOSTS="smtp.gmail.com:587 smtp.office365.com:587"

# TCP connect timeout (seconds)
RELAY_TIMEOUT=10

# ── SASL auth failure thresholds (per check interval) ────────────────────────
# Covers both Gmail app password failures and M365 OAuth token failures
SASL_FAIL_WARN=3
SASL_FAIL_CRIT=10

# ── Bounce threshold (per check interval) ───────────────────────────────────
BOUNCE_WARN=20

# ── Spool disk usage ────────────────────────────────────────────────────────
SPOOL_WARN_PCT=80
SPOOL_CRIT_PCT=95

# ── Mail log ────────────────────────────────────────────────────────────────
# Path to mail log. Leave empty for auto-detect:
#   Debian/Ubuntu → /var/log/mail.log
#   RHEL/Rocky    → /var/log/maillog
MAIL_LOG=""

# ── Paths ────────────────────────────────────────────────────────────────────
STATE_DIR="/var/lib/hostcheck-mail"
LOG_FILE="/var/log/hostcheck-mail.log"
