###############################################################################
# hostcheck-health.conf
#
# Configuration for the host-healthcheck.sh script.
# Place this file at: /etc/hostcheck/hostcheck-health.conf
#
# This file is sourced by bash — use key=value syntax (no spaces around =).
###############################################################################

# ── Telegram notifications ───────────────────────────────────────────────────
# To set up:
#   1. Message @BotFather on Telegram → /newbot → get the bot token
#   2. Start a chat with the bot, send a message
#   3. GET https://api.telegram.org/bot<TOKEN>/getUpdates → find chat_id
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# ── Email notifications (fallback) ──────────────────────────────────────────
# Requires sendmail, msmtp, or mail command on the host.
# For msmtp setup, see: https://wiki.archlinux.org/title/Msmtp
EMAIL_ENABLED="false"
EMAIL_TO="admin@example.com"
EMAIL_FROM="hostcheck-health@$(hostname -f 2>/dev/null || hostname)"

# ── Syslog ───────────────────────────────────────────────────────────────────
# Log findings to syslog via logger command.
SYSLOG_ENABLED="true"
SYSLOG_TAG="hostcheck-health"

# ── Alert cooldown ───────────────────────────────────────────────────────────
# Same alert will not be re-sent within this window (in seconds).
# Default: 3600 (1 hour)
ALERT_COOLDOWN_SEC=3600

# ── Checks (enable / disable) ───────────────────────────────────────────────
CHECK_NIC="true"
CHECK_DISK="true"
CHECK_SMART="true"
CHECK_CEPH="true"
CHECK_COROSYNC="true"
CHECK_PEERS="true"
CHECK_CPU="true"
CHECK_MEMORY="true"
CHECK_LOAD="true"
CHECK_SYSTEMD="true"
CHECK_FILESYSTEM="true"

# ── Thresholds ───────────────────────────────────────────────────────────────

# Disk space (percentage)
DISK_WARN_PCT=85
DISK_CRIT_PCT=95

# CPU usage (percentage) — alert only if sustained across two consecutive runs
CPU_WARN_PCT=90

# Memory usage (percentage)
MEM_WARN_PCT=90
MEM_CRIT_PCT=95

# Load average — alert when 15m load exceeds CPU_count * multiplier
LOAD_WARN_MULTIPLIER=2

# SMART disk temperature warning (Celsius)
SMART_TEMP_WARN=55

# ── Peer reachability ────────────────────────────────────────────────────────
# Space-separated list of peer hostnames or IPs to ping.
# Leave empty to auto-detect from pvecm nodes (recommended for Proxmox).
# Example: PEER_HOSTS="pve01 pve02 pve03"
# Example: PEER_HOSTS="10.0.0.11 10.0.0.12 10.0.0.13"
PEER_HOSTS=""

# Ping settings
PEER_PING_COUNT=3
PEER_PING_TIMEOUT=5

# ── Paths ────────────────────────────────────────────────────────────────────
STATE_DIR="/var/lib/hostcheck-health"
LOG_FILE="/var/log/hostcheck-health.log"

# ── NIC exclusion ────────────────────────────────────────────────────────────
# Regex pattern for virtual / bridge interfaces to skip during NIC checks.
NIC_EXCLUDE="lo|veth.*|fwbr.*|fwpr.*|fwln.*|tap.*|docker.*"
