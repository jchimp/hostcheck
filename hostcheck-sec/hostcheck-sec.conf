###############################################################################
# hostcheck-sec.conf
#
# Configuration for the hostcheck-sec.sh script.
# Place this file at: /etc/hostcheck-sec/hostcheck-sec.conf
#
# This file is sourced by bash — use key=value syntax (no spaces around =).
###############################################################################

# ── Telegram notifications ───────────────────────────────────────────────────
# To set up:
#   1. Message @BotFather on Telegram → /newbot → get the bot token
#   2. Start a chat with the bot, send a message
#   3. GET https://api.telegram.org/bot<TOKEN>/getUpdates → find chat_id
TELEGRAM_ENABLED="false"
TELEGRAM_BOT_TOKEN=""
TELEGRAM_CHAT_ID=""

# ── Email notifications (fallback) ──────────────────────────────────────────
# Requires sendmail, msmtp, or mail command on the host.
EMAIL_ENABLED="false"
EMAIL_TO="admin@example.com"
EMAIL_FROM="hostcheck-sec@$(hostname -f 2>/dev/null || hostname)"

# ── Syslog ───────────────────────────────────────────────────────────────────
SYSLOG_ENABLED="true"
SYSLOG_TAG="hostcheck-sec"

# ── Alert cooldown ───────────────────────────────────────────────────────────
# Same alert will not be re-sent within this window (in seconds).
# Default: 3600 (1 hour)
ALERT_COOLDOWN_SEC=3600

# ── Checks (enable / disable) ───────────────────────────────────────────────
CHECK_SSH_FAILED="true"
CHECK_SSH_ROOT="true"
CHECK_SUDO_FAILED="true"
CHECK_NEW_USERS="true"
CHECK_UPDATES="true"
CHECK_REBOOT="true"
CHECK_CERTS="true"
CHECK_SSH_CONFIG="true"
CHECK_AUTHORIZED_KEYS="true"
CHECK_LISTENING_PORTS="true"
CHECK_WORLD_WRITABLE="true"

# ── Auth log ─────────────────────────────────────────────────────────────────
# Path to auth log. Leave empty for auto-detect:
#   Debian/Ubuntu/Proxmox → /var/log/auth.log
#   RHEL/Rocky/Alma       → /var/log/secure
AUTH_LOG=""

# ── Thresholds ───────────────────────────────────────────────────────────────

# Failed SSH login thresholds (per check interval)
SSH_FAIL_WARN=10
SSH_FAIL_CRIT=50

# Failed sudo attempt threshold (per check interval)
SUDO_FAIL_WARN=5

# Certificate expiry thresholds (days)
CERT_WARN_DAYS=30
CERT_CRIT_DAYS=7

# Certificate paths to scan (space-separated, directories or files)
# Proxmox certs are in /etc/pve/local, system certs in /etc/ssl/certs
CERT_PATHS="/etc/pve/local /etc/ssl/certs"

# ── Paths ────────────────────────────────────────────────────────────────────
STATE_DIR="/var/lib/hostcheck-sec"
LOG_FILE="/var/log/hostcheck-sec.log"
